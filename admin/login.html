<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول للأدمن | لوحة التحكم</title>
    <link rel="stylesheet" href="../css/style.css?v=52" />
    <link rel="stylesheet" href="css/admin.css?v=52" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="js/auth.js?v=52"></script>
    <style>
      body.login-page {
        background: var(--green-dark) !important;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      body.login-page::before {
        background: var(--texture-grain), var(--green-dark) !important;
      }
      body.login-page::after {
        opacity: 0.08; /* Make the gold pattern slightly more visible on the dark green background */
      }
      
      .login-logo {
        text-align: center;
        margin-bottom: 1.25rem;
      }
      .login-logo img {
        width: 5.5rem;
        height: 5.5rem;
        margin: 0 auto 0.75rem;
        filter: drop-shadow(0 0 12px var(--gold-glow));
        transition: transform 0.4s var(--ease);
      }
      .login-logo img:hover {
        transform: rotate(10deg) scale(1.05);
      }
      .login-logo h2 {
        font-size: 1.6rem;
        font-weight: 900;
        color: var(--green-dark);
        margin-top: 0.5rem;
      }
      .login-logo p {
        color: var(--gold);
        font-size: 0.9rem;
        font-weight: 700;
        margin-top: 0.2rem;
      }
      .login-ornament {
        font-family: var(--font-quran);
        color: var(--gold);
        font-size: 1.6rem;
        display: block;
        margin: 0.4rem auto;
        text-align: center;
        opacity: 0.85;
      }
      
      .login-card {
        max-width: 24.5rem !important;
        width: 92%;
        padding: 3rem 2.5rem;
        border: 1px solid rgba(200, 161, 90, 0.25) !important;
        border-top: 4px solid var(--green) !important; /* Thick green border at the top for brand reinforcement */
        box-shadow: 0 1.5rem 3.5rem rgba(8, 59, 45, 0.3) !important; /* Deeper shadow on dark background */
        position: relative;
        background: rgba(255, 255, 255, 0.97) !important;
        border-radius: var(--radius);
        outline: 1px solid rgba(212, 175, 55, 0.22) !important;
        outline-offset: -5px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: transform var(--transition), box-shadow var(--transition);
      }
      
      .login-card:hover {
        box-shadow: 0 2rem 4.5rem rgba(8, 59, 45, 0.4) !important;
      }

      .form-field input {
        width: 100%;
        padding: 0.85rem 1rem 0.85rem 2.8rem !important; /* spacing on left for the icon/toggle */
        border: 1px solid #e0dcd3 !important;
        border-radius: var(--radius-sm) !important;
        font-family: inherit;
        font-size: 1rem !important;
        background: var(--white) !important;
        transition: border-color var(--transition), box-shadow var(--transition);
        text-align: right;
        outline: none;
      }

      .form-field input:focus {
        border-color: var(--green) !important;
        box-shadow: 0 0 0 3px rgba(13, 92, 70, 0.12) !important;
      }

      #login-error {
        color: #ff4d4d;
        background: rgba(255, 68, 68, 0.08);
        border: 1px solid rgba(255, 68, 68, 0.2);
        padding: 0.75rem 1rem;
        border-radius: var(--radius-sm);
        font-size: 0.88rem;
        margin-top: 1.25rem;
        display: none;
        text-align: center;
        font-weight: 700;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
      }
      
      .back-to-site-link {
        color: var(--green-light);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition: color var(--transition);
      }
      .back-to-site-link:hover {
        color: var(--gold) !important;
      }
      .back-to-site-link i {
        transition: transform var(--transition);
      }
      .back-to-site-link:hover i {
        transform: translateX(-4px); /* RTL correct transition direction */
      }

      /* Responsive styling for mobile devices */
      @media (max-width: 480px) {
        .login-card {
          padding: 2.25rem 1.5rem 1.75rem !important;
          border-radius: var(--radius-sm) !important;
        }
        .login-logo img {
          width: 4.5rem;
          height: 4.5rem;
          margin-bottom: 0.5rem;
        }
        .login-logo h2 {
          font-size: 1.4rem;
        }
        .login-logo p {
          font-size: 0.82rem;
        }
        .login-ornament {
          font-size: 1.35rem;
          margin: 0.25rem auto;
        }
        .form-field input {
          font-size: 0.95rem !important;
          padding: 0.75rem 0.85rem 0.75rem 2.5rem !important;
        }
      }
    </style>
    <link rel="icon" type="image/png" href="../images/masjidlogo.png" />
    <link rel="manifest" href="manifest.json" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
  </head>
  <body class="login-page">
    <div class="about-card login-card reveal">
      <div class="login-logo">
        <img src="../images/masjidlogo.png" alt="شعار المسجد" />
        <h2>مسجد الشهداء</h2>
        <div class="login-ornament">۞</div>
        <p>لوحة التحكم وإدارة الموقع</p>
      </div>

      <form id="admin-login-form">
        <div class="form-field form-group full-width" style="margin-bottom: 1.25rem; position: relative;">
          <label for="email" style="font-weight: 700; color: var(--green-dark); text-align: right; display: block; margin-bottom: 0.4rem;">
            <i class="ph ph-envelope" style="color: var(--gold); margin-left: 0.35rem; vertical-align: middle;"></i>البريد الإلكتروني
          </label>
          <div style="position: relative;">
            <input type="email" id="email" placeholder="أدخل البريد الإلكتروني..." value="" autocomplete="off" required />
            <i class="ph ph-user-circle" style="position: absolute; left: 0.95rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.25rem;"></i>
          </div>
        </div>
        <div class="form-field form-group full-width" style="margin-bottom: 1.5rem; position: relative;">
          <label for="password" style="font-weight: 700; color: var(--green-dark); text-align: right; display: block; margin-bottom: 0.4rem;">
            <i class="ph ph-lock-key" style="color: var(--gold); margin-left: 0.35rem; vertical-align: middle;"></i>كلمة المرور
          </label>
          <div style="position: relative;">
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" id="toggle-password" style="position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); font-size: 1.25rem; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0.2rem; outline: none;">
              <i class="ph ph-eye" id="password-eye-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="login-submit">تسجيل الدخول</button>
      </form>

      <div id="login-error">
        <i class="ph ph-warning-circle" style="font-size: 1.1rem;"></i>
        <span>اسم المستخدم أو كلمة المرور غير صحيحة.</span>
      </div>
      
      <div style="text-align: center; margin-top: 1.5rem; border-top: 1px dashed rgba(200, 161, 90, 0.15); padding-top: 1.25rem;">
        <a href="../index.html" class="back-to-site-link">
          <i class="ph ph-arrow-right"></i>
          <span>العودة للموقع الرئيسي</span>
        </a>
      </div>
    </div>

    <script type="module" src="js/db.js?v=52"></script>
    <script type="module">
      // Password visibility toggle
      const togglePasswordBtn = document.getElementById('toggle-password');
      const passwordInput = document.getElementById('password');
      const passwordEyeIcon = document.getElementById('password-eye-icon');

      togglePasswordBtn.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        passwordEyeIcon.classList.toggle('ph-eye');
        passwordEyeIcon.classList.toggle('ph-eye-slash');
      });

      document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('login-error');
        const submitBtn = document.getElementById('login-submit');

        // Loading state
        submitBtn.disabled = true;
        submitBtn.textContent = 'جاري التحقق...';
        errorEl.style.display = 'none';

        try {
          if (!window.DB || !window.DB.loginAdmin) {
            throw new Error("قاعدة البيانات غير مهيأة بعد. يرجى الانتظار ثانية.");
          }
          const success = await window.DB.loginAdmin(email, password);
          if (success) {
            sessionStorage.setItem('masjid_auth', 'true');
            localStorage.setItem('masjid_auth', 'true');
            localStorage.setItem('adminUser', email);
            window.location.href = 'index.html';
          } else {
            errorEl.style.display = 'flex';
            submitBtn.disabled = false;
            submitBtn.textContent = 'تسجيل الدخول';
          }
        } catch (err) {
          console.error(err);
          alert("❌ حدث خطأ أثناء تسجيل الدخول: " + err.message);
          submitBtn.disabled = false;
          submitBtn.textContent = 'تسجيل الدخول';
        }
      });
    </script>
  </body>
</html>
